
services:

  # -------------------------------
  # PostgreSQL 17
  # -------------------------------
  db-service:
    image: postgres:17
    container_name: postgres-server-deploy
    environment:
      POSTGRES_DB: dbemploye
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - employedata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dbemploye"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------
  # PGAdmin
  # -------------------------------
  pgadmin-service:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-deploy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "8081:80"
    depends_on:
      db-service:
        condition: service_healthy
    restart: always

  # -------------------------------
  # Backend FastAPI
  # -------------------------------
  backend-service:
    build: .
    container_name: backend-gestion-employe-deploy
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db-service:5432/dbemploye
    depends_on:
      db-service:
        condition: service_healthy
    restart: always

# -------------------------------
# Volume persistant declaration de volumes
# -------------------------------
volumes:
  employedata: